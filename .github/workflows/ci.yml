name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Four independent gates. `compile` runs first because everything else depends on the contracts
# building; `solhint` does not, so it runs in parallel and gives fast feedback on style.
#
# Actions are pinned to a commit SHA, not a tag. A tag is mutable: `@v4` can be repointed at new
# code by whoever controls the action, and that code runs with your repository token. Pinning to
# a SHA is the difference between "we trust this action's author forever" and "we trust this
# exact code". Dependabot will bump the SHAs and leave the version comment intact.
jobs:
  compile:
    name: Compile (Solidity 0.8.24)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx hardhat compile

  test:
    name: Tests (unit + integration + property + security)
    runs-on: ubuntu-24.04
    needs: compile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx hardhat test

  lint:
    name: Solhint + Prettier + tsc
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck

  slither:
    name: Slither (static analysis)
    runs-on: ubuntu-24.04
    needs: compile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - run: pip install slither-analyzer==0.10.4

      - name: Install solc 0.8.24
        # Fetch the binary straight from binaries.soliditylang.org rather than going through
        # solc-select, whose GitHub API call rate-limits anonymous CI runners with a 403.
        run: |
          sudo curl -fsSL \
            https://binaries.soliditylang.org/linux-amd64/solc-linux-amd64-v0.8.24+commit.e11b9ed9 \
            -o /usr/local/bin/solc
          sudo chmod +x /usr/local/bin/solc
          solc --version

      - name: Run Slither
        env:
          SOLC: /usr/local/bin/solc
        run: npm run slither
